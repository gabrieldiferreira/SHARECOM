services:
  # ── Main Next.js app (Vercel handles this, Render for reference) ──────────
  # Deployed to Vercel — render.yaml focuses on backend workers

  # ── BullMQ Background Worker ──────────────────────────────────────────────
  - type: worker
    name: sharecom-worker
    runtime: node
    plan: starter          # $7/month — 512MB RAM, 0.5 CPU
    region: oregon          # Oregon closest to São Paulo via AWS latency
    buildCommand: npm ci --prefer-offline && npm run build:worker
    startCommand: node dist/worker/index.js
    envVars:
      - key: DATABASE_URL
        sync: false          # Set in Render dashboard (never in git)
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=384"  # Leave 128MB headroom from 512MB
    scaling:
      minInstances: 1
      maxInstances: 1         # Fixed — no auto-scale on starter plan
    healthCheckPath: /health  # Render pings this to verify worker is alive

  # ── Cron: Daily burn rate (2AM BRT = 5AM UTC) ─────────────────────────────
  - type: cron
    name: burn-rate-cron
    runtime: node
    plan: starter
    schedule: "0 5 * * *"
    buildCommand: npm ci --prefer-offline
    startCommand: node -e "require('./dist/worker/index').runDailyBurnRate()"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NODE_ENV
        value: production

  # ── Cron: Budget alerts (midnight BRT = 3AM UTC) ──────────────────────────
  - type: cron
    name: budget-alerts-cron
    runtime: node
    plan: starter
    schedule: "0 3 * * *"
    buildCommand: npm ci --prefer-offline
    startCommand: node -e "require('./dist/worker/index').runMidnightBudgetAlerts()"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production

  # ── Cron: Pre-compute analytics heatmaps (4AM BRT = 7AM UTC) ─────────────
  - type: cron
    name: analytics-precompute-cron
    runtime: node
    plan: starter
    schedule: "0 7 * * *"
    buildCommand: npm ci --prefer-offline
    startCommand: >
      node -e "
        const { prisma } = require('./dist/lib/prisma');
        const { Queue } = require('bullmq');
        const IORedis = require('ioredis');
        const conn = new IORedis(process.env.REDIS_URL);
        const q = new Queue('analytics-precompute', { connection: conn });
        prisma.user.findMany({ select: { id: true } })
          .then(users => Promise.all(users.map(u => q.add('precompute', { userId: u.id, mode: 'all' }, { priority: 4 }))))
          .then(() => process.exit(0))
      "
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NODE_ENV
        value: production
